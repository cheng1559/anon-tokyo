# AnonTokyo — Scene-Centric prediction with RoPE/DRoPE
seed_everything: 42

trainer:
  max_epochs: 30
  precision: bf16-mixed
  strategy: ddp
  devices: auto
  num_nodes: 1
  logger:
    class_path: lightning.pytorch.loggers.TensorBoardLogger
    init_args:
      save_dir: tb_logs
      name: prediction_anon_tokyo
  gradient_clip_val: 1000.0
  log_every_n_steps: 10
  callbacks:
    - class_path: lightning.pytorch.callbacks.ModelCheckpoint
      init_args:
        monitor: val/mAP
        mode: max
        save_top_k: 3
    - class_path: lightning.pytorch.callbacks.ModelCheckpoint
      init_args:
        every_n_train_steps: 1000
        save_top_k: -1
        save_last: true
    - class_path: lightning.pytorch.callbacks.LearningRateMonitor

model:
  model:
    class_path: anon_tokyo.prediction.anon_tokyo.model.AnonTokyoModel
    init_args:
      d_model: 256
      num_encoder_layers: 6
      num_decoder_layers: 6
      d_decoder: 512
      num_heads: 8
      sparse_k: 32
      num_modes: 6
      num_intention_queries: 64
      num_future_frames: 80
      use_rope: true
      use_drope: true
      intention_points_file: data/intention_points.pkl
  optimizer_class: torch.optim.AdamW
  optimizer_kwargs:
    lr: 1.0e-4
    weight_decay: 0.01
  scheduler_kwargs:
    warmup_ratio: 0.1
    start_factor: 0.1
    eta_min: 1.0e-6
  loss_weights:
    reg: 1.0
    score: 1.0
    vel: 0.2
  compile_model: false

data:
  data_root: data/shards
  batch_size: 10
  num_workers: 8
  max_agents: 128
  max_polylines: 768
  use_npz: true
  npz_root: data/processed
